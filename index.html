<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./brand-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ali Raza | Web Developer & Ecommerce Expert</title>
    <meta
      name="description"
      content="Portfolio website for Ali Raza, a web developer and ecommerce expert building Shopify, WordPress, WooCommerce, Squarespace, SEO, and business website solutions."
    />
    <meta
      name="keywords"
      content="Ali Raza, Web Developer, Ecommerce Expert, Shopify Developer, WordPress Developer, WooCommerce, Squarespace, SEO, Business Websites"
    />
    <meta name="author" content="Ali Raza" />
    <meta property="og:title" content="Ali Raza | Web Developer & Ecommerce Expert" />
    <meta
      property="og:description"
      content="Explore Ali Raza's ecommerce platforms, website development experience, technical skills, education, and contact details."
    />

    <meta property="og:image" content="./social-preview.svg" />
    <meta property="og:url" content="https://alirazawebexpert.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#080b14" />
    <script>
      const storedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', initialTheme === 'dark');
      document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
